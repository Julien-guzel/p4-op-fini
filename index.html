<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/0646f5ffbd.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="public/css/style.css">
    <title>ohmyfood</title>
</head>
<body>
    <header class="titre">
        <h1 class="titre--text">ohmyfood</h1>
    </header>
    <main>
        <div class="Localisation background-color-gris">
            <h4><i class="fa-solid fa-location-dot"></i>Paris, Belleville</h4>
        </div>
        <div class="reserver-le-menu background-gris-clair">
            <h2>Réservez le menu qui vous convient</h2>
            <p>Découvrez des restaurants d'exception, séléctionnés par nos soins.</p>
            <button class="boutton-explorer-nos-restaurants"><span class="color-blanc">Explorer nos restaurants</span></button>
        </div>
    </main>
<h2 class="h2-Fonctionnement">Fonctionnement</h2>
    <section class="Fonctionnement">
        <div class="background-gris-clair"><p class="background-violet">1</p><i class="fa-solid fa-mobile-screen-button color-gris-clair"></i>Choisissez un restaurant</div>
        <div class="background-gris-clair"><p class="background-violet">2</p><i class="fa-solid fa-list color-gris-clair"></i>Composez votre menu</div>
        <div class="background-gris-clair"><p class="background-violet">3</p><i class="fa-solid fa-store color-gris-clair"></i>Dégustez au restaurant</div>
    </section>
</body>
</html>
